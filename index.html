<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>AR Динозавры - с информацией при нажатии</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            z-index: 20;
            flex-wrap: wrap;
            border: 1px solid rgba(255,255,255,0.2);
        }
        button {
            padding: 10px 20px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            background: #ffaa00;
            color: #1a1a2e;
            transition: transform 0.2s;
        }
        button:active { transform: scale(0.96); }
        #dino-name {
            font-size: 18px;
            font-weight: bold;
            background: rgba(0,0,0,0.5);
            padding: 8px 16px;
            border-radius: 40px;
            letter-spacing: 1px;
        }
        .nav-btn {
            background: #2c3e50;
            color: white;
            font-size: 24px;
            padding: 8px 20px;
        }
        #ar-button {
            background: #00aaff;
            color: white;
            box-shadow: 0 0 10px rgba(0,170,255,0.5);
        }
        /* Модальное окно (табличка) */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: linear-gradient(135deg, #1e2a3a, #0f172a);
            color: white;
            padding: 25px;
            border-radius: 24px;
            width: 80%;
            max-width: 350px;
            text-align: center;
            border-top: 4px solid #ffaa00;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
        }
        .close-btn {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        .close-btn:hover { color: white; }
        .dino-name-modal {
            font-size: 28px;
            margin: 15px 0 10px;
            color: #ffaa00;
        }
        .dino-desc {
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 20px;
        }
        @media (max-width: 600px) {
            .controls { padding: 8px 15px; }
            button { padding: 6px 12px; font-size: 14px; }
            .nav-btn { font-size: 20px; padding: 6px 16px; }
            #dino-name { font-size: 14px; }
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "@google/model-viewer": "https://unpkg.com/@google/model-viewer@latest/dist/model-viewer.js"
            }
        }
    </script>
    <script type="module">
        import '@google/model-viewer';

        document.addEventListener('DOMContentLoaded', () => {
            const modelViewer = document.querySelector('model-viewer');
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');
            const dinoNameSpan = document.getElementById('dino-name');
            const arButton = document.getElementById('ar-button');
            const modal = document.getElementById('infoModal');
            const closeBtn = document.querySelector('.close-btn');
            const modalDinoName = document.getElementById('modal-dino-name');
            const modalDinoDesc = document.getElementById('modal-dino-desc');

            // Список динозавров (рабочие ссылки из интернета)
            const dinosaurs = [
                {
                    name: 'Тираннозавр',
                    file: 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/main/2.0/T-Rex/glTF-Binary/T-Rex.glb',
                    desc: '🦖 Длина: 12 м | Вес: 7 т | Период: Мел<br>Один из самых крупных хищников.'
                },
                {
                    name: 'Стегозавр',
                    file: 'https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/models/gltf/Stegosaurus.glb',
                    desc: '🦕 Длина: 9 м | Вес: 5 т | Период: Юрский<br>Известен своими костяными пластинами.'
                },
                {
                    name: 'Трицератопс',
                    file: 'https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/models/gltf/Triceratops.glb',
                    desc: '🦖 Длина: 8 м | Вес: 6 т | Период: Мел<br>Травоядный с тремя рогами.'
                }
            ];
            let currentIndex = 0;

            function loadDino(index) {
                if (index < 0) index = dinosaurs.length - 1;
                if (index >= dinosaurs.length) index = 0;
                currentIndex = index;
                const dino = dinosaurs[currentIndex];
                modelViewer.src = dino.file;
                dinoNameSpan.textContent = dino.name;
            }

            prevBtn.addEventListener('click', () => loadDino(currentIndex - 1));
            nextBtn.addEventListener('click', () => loadDino(currentIndex + 1));
            arButton.addEventListener('click', () => modelViewer.activateAR());

            // Показываем табличку при клике на динозавра
            modelViewer.addEventListener('click', (event) => {
                // Проверяем, кликнули ли по модели
                const intersection = modelViewer.positionAndNormalFromPoint(event.clientX, event.clientY);
                if (intersection) {
                    const dino = dinosaurs[currentIndex];
                    modalDinoName.textContent = dino.name;
                    modalDinoDesc.innerHTML = dino.desc;
                    modal.style.display = 'flex';
                }
            });

            // Закрытие модального окна
            closeBtn.onclick = () => { modal.style.display = 'none'; };
            window.onclick = (event) => {
                if (event.target === modal) modal.style.display = 'none';
            };

            loadDino(0);
        });
    </script>
</head>
<body>
    <model-viewer 
        id="ar-dino"
        src="https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/main/2.0/T-Rex/glTF-Binary/T-Rex.glb"
        alt="3D модель динозавра"
        ar
        ar-modes="quick-look webxr scene-viewer"
        ar-scale="auto"
        camera-controls
        camera-orbit="45deg 75deg 2m"
        environment-image="neutral"
        shadow-intensity="1"
        style="width: 100%; height: 100%;">
    </model-viewer>

    <div class="controls">
        <button class="nav-btn" id="prev-btn">◀</button>
        <span id="dino-name">Тираннозавр</span>
        <button class="nav-btn" id="next-btn">▶</button>
        <button id="ar-button">🚀 Поставить в AR</button>
    </div>

    <!-- Табличка с информацией -->
    <div id="infoModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div class="dino-name-modal" id="modal-dino-name">Тираннозавр</div>
            <div class="dino-desc" id="modal-dino-desc">
                Длина: 12 м | Вес: 7 т | Период: Мел
            </div>
        </div>
    </div>
</body>
</html>
