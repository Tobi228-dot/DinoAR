<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Динозавры: галерея</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            font-family: system-ui, 'Segoe UI', sans-serif;
            background: #0a0f1e;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: #16213e;
            border-radius: 40px;
            padding: 20px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .image-container {
            background: #0f1629;
            border-radius: 32px;
            overflow: hidden;
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }
        .dino-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .info {
            text-align: center;
            margin-bottom: 25px;
        }
        .dino-name {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #ffaa44;
        }
        .dino-desc {
            font-size: 16px;
            opacity: 0.8;
            line-height: 1.4;
        }
        .controls {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-bottom: 25px;
        }
        button {
            flex: 1;
            background: #2c3e66;
            border: none;
            padding: 14px;
            border-radius: 60px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button:active { transform: scale(0.96); }
        .ar-btn {
            background: #ffaa44;
            color: #0a0f1e;
            width: 100%;
            font-size: 20px;
        }
        .nav-btn {
            background: #1e2a4a;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="image-container">
            <img id="dino-image" class="dino-image" src="trex.jpg" alt="Тираннозавр">
        </div>
        <div class="info">
            <div id="dino-name" class="dino-name">Тираннозавр</div>
            <div id="dino-desc" class="dino-desc">Длина 12 м | Вес 7 т | Мел</div>
        </div>
        <div class="controls">
            <button id="prev-btn" class="nav-btn">◀ Назад</button>
            <button id="next-btn" class="nav-btn">Вперед ▶</button>
        </div>
        <button id="ar-btn" class="ar-btn">🦖 Поставить в AR</button>
    </div>

    <script>
        const dinosaurs = [
            {
                name: 'Тираннозавр',
                desc: '🦖 Длина: 12 м | Вес: 7 т | Период: Мел<br>Огромный хищник с мощными челюстями.',
                image: 'trex.jpg',
                file: 'trex'
            },
            {
                name: 'Велоцираптор',
                desc: '🦕 Длина: 2 м | Вес: 15 кг | Период: Мел<br>Быстрый, умный хищник с серповидным когтем.',
                image: 'velociraptor.jpg',
                file: 'velociraptor'
            },
            {
                name: 'Карнотавр',
                desc: '🦖 Длина: 8 м | Вес: 1.5 т | Период: Мел<br>Быстрый хищник с короткими рогами над глазами.',
                image: 'carnotaurus.jpg',
                file: 'carnotaurus'
            }
        ];
        let currentIndex = 0;

        const imgEl = document.getElementById('dino-image');
        const nameEl = document.getElementById('dino-name');
        const descEl = document.getElementById('dino-desc');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const arBtn = document.getElementById('ar-btn');

        function updateUI() {
            const dino = dinosaurs[currentIndex];
            nameEl.innerHTML = dino.name;
            descEl.innerHTML = dino.desc;
            imgEl.src = dino.image;
        }

        function openAR() {
            const dino = dinosaurs[currentIndex];
            window.location.href = `ar.html?dino=${dino.file}`;
        }

        prevBtn.addEventListener('click', () => {
            currentIndex = (currentIndex - 1 + dinosaurs.length) % dinosaurs.length;
            updateUI();
        });
        nextBtn.addEventListener('click', () => {
            currentIndex = (currentIndex + 1) % dinosaurs.length;
            updateUI();
        });
        arBtn.addEventListener('click', openAR);

        updateUI();
    </script>
</body>
</html>
