<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>AR Динозавр</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: system-ui; }
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            border: none;
            z-index: 20;
            font-size: 16px;
            cursor: pointer;
        }
        .info-note {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            text-align: center;
            font-size: 14px;
            z-index: 20;
            pointer-events: none;
        }
        .error-msg {
            position: absolute;
            top: 50%;
            left: 20px;
            right: 20px;
            background: red;
            color: white;
            padding: 10px;
            text-align: center;
            z-index: 30;
            border-radius: 20px;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "@google/model-viewer": "https://unpkg.com/@google/model-viewer@latest/dist/model-viewer.js"
            }
        }
    </script>
    <script type="module">
        import '@google/model-viewer';

        const urlParams = new URLSearchParams(window.location.search);
        let dinoKey = urlParams.get('dino') || 'trex';
        
        // Маппинг ключей на твои локальные .glb файлы
        const models = {
            trex: 'trex.glb',
            spinosaurus: 'spinosaurus.glb',
            carnotaurus: 'carnotaurus.glb'
        };
        
        const modelSrc = models[dinoKey];
        if (!modelSrc) {
            document.body.innerHTML += '<div class="error-msg">Ошибка: модель не найдена</div>';
        } else {
            const modelViewer = document.querySelector('model-viewer');
            modelViewer.src = modelSrc;
        }

        document.getElementById('back-btn').addEventListener('click', () => {
            window.location.href = 'index.html';
        });
    </script>
</head>
<body>
    <button id="back-btn" class="back-btn">← Назад к галерее</button>
    <model-viewer
        src=""
        alt="Динозавр в AR"
        ar
        ar-modes="quick-look webxr scene-viewer"
        ar-scale="auto"
        camera-controls
        environment-image="neutral"
        shadow-intensity="1"
        style="width: 100%; height: 100%;">
    </model-viewer>
    <div class="info-note">
        🦕 Нажми на модель, чтобы увидеть подсказку. Кнопка AR запускает просмотр в реальности.
    </div>
</body>
</html>
